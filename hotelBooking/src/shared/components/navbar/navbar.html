<nav class="navbar">
  <span class="brand" routerLink="/hotels">🏨 Hotel Booking</span>

  <div class="nav-links">
    <a routerLink="/hotels">Home</a>

    <ng-container *ngIf="auth.isLoggedIn()">
      <a routerLink="/my-bookings">My Bookings</a>
      <a *ngIf="auth.isAdmin()" routerLink="/admin/dashboard">Admin</a>
      <span class="logout" (click)="auth.logout()">Logout</span>
    </ng-container>

    <ng-container *ngIf="!auth.isLoggedIn()">
      <a routerLink="/login">Login</a>
      <a routerLink="/register">Register</a>
    </ng-container>
  </div>
</nav>
