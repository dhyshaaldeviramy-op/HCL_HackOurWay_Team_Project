<div class="payment-container">
  <h2>Payment Form</h2>

  <form (ngSubmit)="submitPayment()">
    <label>Booking ID</label>
    <input type="number" [(ngModel)]="payment.bookingId" name="bookingId" required>

    <label>Amount</label>
    <input type="number" [(ngModel)]="payment.amount" name="amount" required>

    <button type="submit">Pay Now</button>
  </form>

  <button class="fetch-btn" (click)="getPayment()">Get Payment Details</button>

  <p class="message">{{ message }}</p>

 @if (fetchedPayment; as payment) {
  <div class="result">
    <h3>Payment Details</h3>
    <p><strong>Booking ID:</strong> {{ payment.bookingId }}</p>
    <p><strong>Amount:</strong> ₹{{ payment.amount }}</p>
  </div>
}
</div>
